<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>海克斯符文统计</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef2f0;
      color: #182124;
      --bg: #eef2f0;
      --panel: #ffffff;
      --panel-soft: #f7faf8;
      --text: #182124;
      --muted: #657275;
      --line: #d7dfdc;
      --line-strong: #bfcac6;
      --accent: #7c3aed;
      --accent-soft: #efe8ff;
      --accent-text: #4c1d95;
      --shadow: 0 10px 26px rgba(24, 33, 36, 0.08);
    }
    body {
      margin: 0;
      padding: 30px;
      background: var(--bg);
    }
    main {
      max-width: 1280px;
      margin: 0 auto;
    }
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 30px;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .muted {
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.55;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin: 18px 0 18px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .stat b {
      display: block;
      font-size: 24px;
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
      color: var(--accent-text);
    }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 20px;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 10px;
      color: inherit;
      background: var(--panel);
      text-decoration: none;
      font-size: 14px;
    }
    .links a:hover {
      border-color: var(--accent);
      color: var(--accent-text);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .controls label {
      font-size: 14px;
      font-weight: 650;
    }
    .controls select,
    .controls button {
      min-width: 180px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 7px 10px;
      background: var(--panel-soft);
      color: inherit;
      font: inherit;
      font-size: 14px;
    }
    .controls button {
      min-width: 96px;
      cursor: pointer;
      font-weight: 650;
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }
    .controls button:disabled {
      cursor: wait;
      opacity: 0.7;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
      margin-bottom: 18px;
    }
    .grid section,
    .table-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .grid section {
      padding: 16px;
    }
    .table-panel {
      margin-top: 18px;
      overflow: hidden;
    }
    .table-panel > summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }
    .table-panel > summary::-webkit-details-marker {
      display: none;
    }
    .panel-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-right: 10px;
      font-size: 18px;
      font-weight: 700;
    }
    .panel-meta {
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      padding: 3px 8px;
      background: var(--accent-soft);
      color: var(--accent-text);
      font-size: 13px;
      font-weight: 650;
    }
    .summary-chevron {
      display: inline-flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      transition: transform 160ms ease;
    }
    .table-panel[open] .summary-chevron {
      transform: rotate(180deg);
    }
    .table-shell {
      overflow-x: auto;
      border-top: 1px solid var(--line);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      overflow: hidden;
    }
    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      font-size: 13px;
      white-space: nowrap;
    }
    th:first-child, td:first-child {
      text-align: left;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    th {
      position: sticky;
      top: 0;
      background: var(--panel-soft);
      font-weight: 650;
    }
    tr:last-child td {
      border-bottom: 0;
    }
    .empty {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      color: var(--muted);
    }
    @media (max-width: 720px) {
      body {
        padding: 18px;
      }
      .dashboard-header {
        display: block;
      }
      .controls {
        margin-top: 14px;
      }
      .controls select,
      .controls button {
        flex: 1 1 160px;
        min-width: 0;
      }
    }
    @media (prefers-color-scheme: dark) {
      :root {
        background: #101719;
        color: #e7ece9;
        --bg: #101719;
        --panel: #182023;
        --panel-soft: #202a2d;
        --text: #e7ece9;
        --muted: #9caaa7;
        --line: #2c3839;
        --line-strong: #3a4849;
        --accent: #a78bfa;
        --accent-soft: #2c2440;
        --accent-text: #ddd6fe;
        --shadow: none;
      }
      .controls button {
        background: #7c3aed;
        border-color: #7c3aed;
        color: #ffffff;
      }
      .stat b {
        color: var(--accent-text);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="dashboard-header">
      <div>
        <h1>海克斯符文统计</h1>
        <div class="muted" id="updated" data-generated-at-utc="">正在读取数据...</div>
      </div>
      <div class="controls">
        <label for="versionFilter">统计版本</label>
        <select id="versionFilter">
          <option value="all">全部版本</option>
        </select>
        <button id="applyVersion" type="button">应用选择</button>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><b id="eligibleRuns">0</b>纳入胜率的局数</div>
      <div class="stat"><b id="rawRuns">0</b>原始唯一局数</div>
      <div class="stat"><b id="shortRuns">0</b>默认排除的短局</div>
      <div class="stat"><b id="wins">0</b>胜利局数</div>
      <div class="stat"><b id="winRate">0%</b>玩家胜率</div>
    </div>
    <div class="muted" id="filterNote"></div>
    <div class="links">
      <a href="/api/hextech-runes/derived/summary.json">summary.json</a>
      <a href="/api/hextech-runes/derived/runs.csv">runs.csv</a>
      <a href="/api/hextech-runes/derived/player_runes.csv">player_runes.csv</a>
      <a href="/api/hextech-runes/derived/rune_choices.csv">rune_choices.csv</a>
      <a href="/api/hextech-runes/derived/monster_hexes.csv">monster_hexes.csv</a>
    </div>

    <div class="grid">
      <section>
        <h2>版本分布</h2>
        <table id="versions"></table>
      </section>
      <section>
        <h2>模式分布</h2>
        <table id="netModes"></table>
      </section>
      <section>
        <h2>角色分布</h2>
        <table id="characters"></table>
      </section>
    </div>

    <section>
      <details class="table-panel" id="choicesPanel">
        <summary>
          <span>
            <span class="panel-title">我方海克斯选择率</span>
            <span class="panel-meta" id="choicesMeta">0 条</span>
          </span>
          <span class="summary-chevron" aria-hidden="true">⌄</span>
        </summary>
        <div class="table-shell">
          <table id="choices"></table>
        </div>
      </details>
    </section>
    <section>
      <details class="table-panel" id="monsterHexesPanel">
        <summary>
          <span>
            <span class="panel-title">敌方海克斯胜率</span>
            <span class="panel-meta" id="monsterHexesMeta">0 条</span>
          </span>
          <span class="summary-chevron" aria-hidden="true">⌄</span>
        </summary>
        <div class="table-shell">
          <table id="monsterHexes"></table>
        </div>
      </details>
    </section>
  </main>
  <script>
    const API_BASE = window.location.protocol === "file:" ? "http://39.96.216.77" : "";
    const fmtPct = (value) => `${Number(value || 0).toFixed(1)}%`;
    const limitRows = (rows, limit = 80) => Array.isArray(rows) ? rows.slice(0, limit) : [];
    const displayLabel = (row) => row && row.name && row.name !== row.id ? `${row.name} (${row.id})` : ((row && row.id) || "");
    let renderRequestId = 0;
    let versionFilterTouched = false;

    function text(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function apiPath(path) {
      return `${API_BASE}${path}`;
    }

    function compareVersionsDesc(a, b) {
      return String(b).localeCompare(String(a), undefined, { numeric: true, sensitivity: "base" });
    }

    function renderTable(node, headers, rows) {
      if (!rows.length) {
        node.innerHTML = [
          `<thead><tr>${headers.map((h) => `<th>${text(h)}</th>`).join("")}</tr></thead>`,
          `<tbody><tr><td colspan="${headers.length}">暂无可显示数据</td></tr></tbody>`
        ].join("");
        return;
      }
      node.innerHTML = [
        `<thead><tr>${headers.map((h) => `<th>${text(h)}</th>`).join("")}</tr></thead>`,
        `<tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${text(cell)}</td>`).join("")}</tr>`).join("")}</tbody>`
      ].join("");
    }

    function renderPanelCount(id, rows) {
      const node = document.getElementById(id);
      if (node) {
        node.textContent = `${Array.isArray(rows) ? rows.length : 0} 条`;
      }
    }

    function summaryUrl(version) {
      return version && version !== "all"
        ? apiPath(`/api/hextech-runes/summary?version=${encodeURIComponent(version)}`)
        : apiPath("/api/hextech-runes/summary");
    }

    function getQueryVersion() {
      const value = new URLSearchParams(window.location.search).get("version");
      return value && value.trim() ? value.trim() : null;
    }

    function setQueryVersion(version) {
      const url = new URL(window.location.href);
      if (version && version !== "all") {
        url.searchParams.set("version", version);
      } else {
        url.searchParams.set("version", "all");
      }
      window.history.replaceState(null, "", url);
    }

    function buildFilterNote(summary) {
      const version = summary.versionFilter || (summary.filters && summary.filters.version) || "all";
      const versionText = version === "all" ? "全部版本" : `版本 ${version}`;
      return `当前统计口径：${versionText}，排除 runTime < ${summary.filters.minRunTimeForDefaultStats} 秒的历史局；0.5.0 起客户端会直接跳过短局上传。`;
    }

    function formatLocalDateTime(value) {
      if (!value) {
        return "等待生成统计数据";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      const pad = (number) => String(number).padStart(2, "0");
      let timeZoneName = "";
      try {
        const formatter = new Intl.DateTimeFormat(undefined, { timeZoneName: "short" });
        if (typeof formatter.formatToParts === "function") {
          const part = formatter.formatToParts(date).find((item) => item.type === "timeZoneName");
          timeZoneName = part ? part.value : "";
        }
      } catch (error) {
        timeZoneName = "";
      }
      if (!timeZoneName) {
        const offsetMinutes = -date.getTimezoneOffset();
        const sign = offsetMinutes >= 0 ? "+" : "-";
        const absMinutes = Math.abs(offsetMinutes);
        timeZoneName = `GMT${sign}${pad(Math.floor(absMinutes / 60))}:${pad(absMinutes % 60)}`;
      }
      return [
        `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`,
        `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`,
        timeZoneName || ""
      ].filter(Boolean).join(" ");
    }

    function renderUpdatedAt(value) {
      const updated = document.getElementById("updated");
      updated.dataset.generatedAtUtc = value || "";
      updated.textContent = value
        ? `更新时间：${formatLocalDateTime(value)}`
        : "等待生成统计数据";
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`${res.status} ${res.statusText}`);
      }
      return res.json();
    }

    function populateVersionFilter(summary, selectedVersion, latestVersion) {
      const select = document.getElementById("versionFilter");
      const versionRows = Array.isArray(summary.availableVersions) ? summary.availableVersions : summary.tables.versions;
      const versionCounts = new Map(versionRows.map((row) => [row.id, row.count]));
      const versions = new Set(versionRows.map((row) => row.id).filter(Boolean));
      if (latestVersion) {
        versions.add(latestVersion);
      }
      select.innerHTML = [
        `<option value="all">全部版本</option>`,
        ...[...versions]
          .sort(compareVersionsDesc)
          .map((version) => {
            const count = versionCounts.get(version);
            const suffix = Number.isFinite(count) ? `（${count}局）` : "（暂无样本）";
            return `<option value="${text(version)}">${text(`${version}${suffix}`)}</option>`;
          })
      ].join("");
      select.value = versions.has(selectedVersion) || selectedVersion === "all" ? selectedVersion : "all";
    }

    function chooseInitialVersion(queryVersion, latestVersion, allSummary) {
      if (queryVersion) {
        return queryVersion;
      }
      const versionRows = Array.isArray(allSummary.availableVersions) ? allSummary.availableVersions : allSummary.tables.versions;
      const availableVersions = new Set(versionRows.map((row) => row.id).filter(Boolean));
      if (latestVersion && availableVersions.has(latestVersion)) {
        return latestVersion;
      }
      return [...availableVersions].sort(compareVersionsDesc)[0] || latestVersion || "all";
    }

    function renderSummary(summary) {
      renderUpdatedAt(summary.generatedAtUtc);
      document.getElementById("eligibleRuns").textContent = summary.runCount;
      document.getElementById("rawRuns").textContent = summary.raw.uniqueRuns;
      document.getElementById("shortRuns").textContent = summary.excludedShortRuns;
      document.getElementById("wins").textContent = summary.winCount;
      document.getElementById("winRate").textContent = fmtPct(summary.winRate);
      document.getElementById("filterNote").textContent = buildFilterNote(summary);

      renderTable(
        document.getElementById("versions"),
        ["版本", "局数"],
        limitRows(summary.tables.versions, 20).map((row) => [displayLabel(row), row.count])
      );
      renderTable(
        document.getElementById("netModes"),
        ["模式", "局数"],
        limitRows(summary.tables.netModes, 20).map((row) => [displayLabel(row), row.count])
      );
      renderTable(
        document.getElementById("characters"),
        ["角色", "玩家样本"],
        limitRows(summary.tables.characters, 20).map((row) => [displayLabel(row), row.count])
      );
      const playerRuneChoices = Array.isArray(summary.tables.playerRuneChoices) ? summary.tables.playerRuneChoices : [];
      renderPanelCount("choicesMeta", playerRuneChoices);
      renderTable(
        document.getElementById("choices"),
        ["海克斯", "出现", "选择", "选择率", "选择后胜率"],
        playerRuneChoices.map((row) => [
          displayLabel(row),
          row.offered,
          row.selected,
          fmtPct(row.pickRate),
          fmtPct(row.selectedWinRate)
        ])
      );
      const monsterHexRuns = Array.isArray(summary.tables.monsterHexRuns) ? summary.tables.monsterHexRuns : [];
      renderPanelCount("monsterHexesMeta", monsterHexRuns);
      renderTable(
        document.getElementById("monsterHexes"),
        ["敌方海克斯", "出现局数", "敌方胜利", "敌方胜率", "玩家胜率"],
        monsterHexRuns.map((row) => [
          displayLabel(row),
          row.runs,
          row.monsterWins,
          fmtPct(row.monsterWinRate),
          fmtPct(row.playerWinRate)
        ])
      );
    }

    async function loadAndRender(version) {
      const requestId = ++renderRequestId;
      setLoadingStatus();
      setApplyButtonBusy(true);
      const summary = await fetchJson(summaryUrl(version));
      if (requestId === renderRequestId) {
        renderSummary(summary);
        setApplyButtonBusy(false);
      }
      return summary;
    }

    async function renderSelectedVersion(version, cachedSummary = null) {
      const requestId = ++renderRequestId;
      setQueryVersion(version);
      try {
        setLoadingStatus();
        setApplyButtonBusy(true);
        const summary = cachedSummary || await fetchJson(summaryUrl(version));
        if (requestId === renderRequestId) {
          renderSummary(summary);
          setApplyButtonBusy(false);
        }
      } catch (error) {
        if (requestId === renderRequestId) {
          setApplyButtonBusy(false);
          document.getElementById("updated").textContent = `读取失败：${error}`;
        }
      }
    }

    function bindVersionFilter() {
      document.getElementById("versionFilter").addEventListener("change", (event) => {
        versionFilterTouched = true;
      });
      document.getElementById("versionFilter").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          renderSelectedVersion(event.currentTarget.value);
        }
      });
      document.getElementById("applyVersion").addEventListener("click", () => {
        renderSelectedVersion(document.getElementById("versionFilter").value);
      });
    }

    function setApplyButtonBusy(isBusy) {
      const button = document.getElementById("applyVersion");
      button.disabled = isBusy;
      button.textContent = isBusy ? "读取中..." : "应用选择";
    }

    function localizePreRenderedTimestamp() {
      const updated = document.getElementById("updated");
      const generatedAtUtc = updated.dataset.generatedAtUtc;
      if (generatedAtUtc) {
        renderUpdatedAt(generatedAtUtc);
      }
    }

    function setLoadingStatus() {
      const updated = document.getElementById("updated");
      const current = updated.textContent.trim();
      if (!current || current === "正在读取数据..." || current.startsWith("读取失败")) {
        updated.textContent = "正在读取数据...";
      }
    }

    async function init() {
      localizePreRenderedTimestamp();
      bindVersionFilter();
      try {
        const [latestInfo, allSummary] = await Promise.all([
          fetchJson(apiPath("/api/hextech-runes/latest-version")).catch(() => ({})),
          fetchJson(summaryUrl("all"))
        ]);
        const latestVersion = latestInfo.latestVersion || null;
        const queryVersion = getQueryVersion();
        const selectedVersion = versionFilterTouched
          ? document.getElementById("versionFilter").value
          : chooseInitialVersion(queryVersion, latestVersion, allSummary);
        populateVersionFilter(allSummary, selectedVersion, latestVersion);
        const initialVersion = document.getElementById("versionFilter").value;
        if (!versionFilterTouched) {
          await renderSelectedVersion(initialVersion, initialVersion === "all" ? allSummary : null);
        }
      } catch (error) {
        document.getElementById("updated").textContent = `读取失败：${error}`;
      }
    }

    init();
  </script>
</body>
</html>
